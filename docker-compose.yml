# version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: lapangin-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: lapangin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    container_name: lapangin-app

    depends_on:
      - postgres

    env_file:
      - .env.local

    ports:
      - "3000:3000"

volumes:
  postgres_data:
