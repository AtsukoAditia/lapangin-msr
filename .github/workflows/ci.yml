name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_PROVIDER: mock
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Install dependencies
        run: npm ci --silent
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
