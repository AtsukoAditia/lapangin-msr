name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop, "feat/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_PROVIDER: mock
      JWT_SECRET: ci-lapangin-readiness-key-minimum-32-chars
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - name: Install dependencies
        run: npm ci --silent
      - name: Local readiness doctor
        run: npm run doctor
      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run type-check -- --pretty false 2>&1 | tee typecheck.log
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          if-no-files-found: ignore
      - name: Stop on typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint -- --format stylish 2>&1 | tee lint.log
      - name: Upload lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-log
          path: lint.log
          if-no-files-found: ignore
      - name: Stop on lint failure
        if: steps.lint.outcome == 'failure'
        run: exit 1
      - name: Build
        run: npm run build
