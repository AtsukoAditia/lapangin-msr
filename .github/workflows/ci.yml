name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feat/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_PROVIDER: mock
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run build
