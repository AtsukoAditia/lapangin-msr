name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lapangin_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          DATABASE_PROVIDER: postgres
          DATABASE_URL: postgresql://test:test@localhost:5432/lapangin_test
          JWT_SECRET: ci-test-secret-minimum-32-characters-long
      - run: npx playwright test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/lapangin_test
